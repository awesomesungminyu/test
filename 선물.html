<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>유성민 설문조사</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      height:100%;
      background:#fff5f7;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      overflow:hidden;
      touch-action:none;
    }
    body{
      display:flex;align-items:center;justify-content:center;
    }
    .card{
      background:white;border-radius:20px;
      padding:2.5rem 2rem;text-align:center;
      box-shadow:0 8px 40px rgba(0,0,0,0.08);
      max-width:420px;width:92%;position:relative;z-index:1;
    }
    .emoji{font-size:48px;margin-bottom:0.8rem;}
    h1{font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:0.3rem;line-height:1.4;}
    .progress{font-size:12px;color:#bbb;margin-bottom:1.8rem;}
    .btn-area{
      display:flex;gap:14px;justify-content:center;
      min-height:50px;align-items:center;
    }
    button{
      padding:12px 28px;font-size:15px;font-weight:500;
      border-radius:50px;border:none;cursor:pointer;
    }
    #yes-btn{
      background:#ff6b8a;color:white;
      transition:transform 0.1s,box-shadow 0.1s;
    }
    #yes-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(255,107,138,0.4);}
    #no-btn{
      background:#f0f0f0;color:#666;
      position:fixed;z-index:999;
      touch-action:none;-webkit-user-select:none;user-select:none;
    }
    #result{
      margin-top:1.2rem;font-size:16px;font-weight:600;
      color:#ff6b8a;min-height:28px;
    }
    #photo-overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,0.78);z-index:9999;
      flex-direction:column;align-items:center;
      justify-content:center;padding:1.5rem;
    }
    #photo-overlay.show{display:flex;}
    #photo-overlay img{
      width:220px;max-width:75vw;border-radius:16px;
      margin-bottom:1rem;border:4px solid white;
    }
    #photo-overlay p{
      color:white;font-size:20px;font-weight:600;
      margin-bottom:1.5rem;text-align:center;
    }
    #photo-overlay button{background:#ff6b8a;color:white;padding:12px 32px;font-size:15px;}
    .hearts{position:fixed;inset:0;pointer-events:none;display:none;}
    .heart{position:absolute;font-size:24px;animation:floatUp 2s ease-in forwards;}
    @keyframes floatUp{
      0%{opacity:1;transform:translateY(0) scale(1);}
      100%{opacity:0;transform:translateY(-200px) scale(1.5);}
    }
    #hint-msg{
      position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,0.65);color:white;
      padding:10px 22px;border-radius:50px;
      font-size:14px;z-index:9998;text-align:center;
      pointer-events:none;opacity:0;transition:opacity 0.4s;
      white-space:nowrap;
    }
    #hint-msg.show{opacity:1;}
  </style>
</head>
<body>

<div class="hearts" id="hearts"></div>
<div id="hint-msg">천천히 다가가서 눌러봐 🐢</div>

let current = 0;
let escapeCount = 0;
let noBtnFixed = false; // fixed 위치로 전환됐는지

const noBtn = document.getElementById('no-btn');
const hint  = document.getElementById('hint-msg');

// No 버튼을 fixed 위치로 고정
function pinNoBtn() {
  if (noBtnFixed) return;
  noBtnFixed = true;
  const r = noBtn.getBoundingClientRect();
  noBtn.style.left   = r.left + 'px';
  noBtn.style.top    = r.top  + 'px';
  noBtn.style.width  = r.width  + 'px';
  noBtn.style.height = r.height + 'px';
}

function resetNoBtn() {
  noBtnFixed = false;
  noBtn.style.transition = 'none';
  noBtn.style.left = noBtn.style.top = noBtn.style.width = noBtn.style.height = '';
}

function runAway(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  pinNoBtn();
  escapeCount++;

  // 3번 초과 → 도망 안 감, 힌트 유지
  if (escapeCount > 3) return;

  // 3번째 도망 → 힌트 표시
  if (escapeCount === 3) hint.classList.add('show');

  const pad  = 16;
  const btnW = noBtn.offsetWidth;
  const btnH = noBtn.offsetHeight;
  const vw   = window.innerWidth;
  const vh   = window.innerHeight;
  const curX = parseFloat(noBtn.style.left) || 0;
  const curY = parseFloat(noBtn.style.top)  || 0;

  let nx, ny, tries = 0;
  do {
    nx = pad + Math.random() * (vw - btnW - pad * 2);
    ny = pad + Math.random() * (vh - btnH - pad * 2);
    tries++;
  } while (tries < 20 && Math.hypot(nx - curX, ny - curY) < 90);

  noBtn.style.transition = 'left 0.15s ease, top 0.15s ease';
  noBtn.style.left = nx + 'px';
  noBtn.style.top  = ny + 'px';
}

// 마우스: mouseenter로 도망
noBtn.addEventListener('mouseenter', runAway);

// 터치: touchstart로 도망 (첫 터치) → 3번 이후엔 touchend로 click 처리
noBtn.addEventListener('touchstart', function(e) {
  if (escapeCount >= 3) {
    // 더 이상 도망 안 감 → 그냥 click으로 처리
    return;
  }
  runAway(e);
}, { passive: false });

noBtn.addEventListener('touchend', function(e) {
  if (escapeCount > 3) {
    e.preventDefault();
    onNo();
  }
}, { passive: false });

noBtn.addEventListener('click', function(e) {
  // 마우스 클릭: escapeCount > 3 이어야 누를 수 있음 (mouseenter가 막혀있으니 자연스럽게 가능)
  onNo();
});

function onNo() {
  document.getElementById('photo-overlay').classList.add('show');
}

function closeOverlay() {
  document.getElementById('photo-overlay').classList.remove('show');
  escapeCount = 0;
  hint.classList.remove('show');
  resetNoBtn();
}

function loadQuestion(idx) {
  const q = questions[idx];
  document.getElementById('q-emoji').textContent    = q.emoji;
  document.getElementById('q-text').textContent     = q.text;
  document.getElementById('q-progress').textContent = `질문 ${idx+1} / ${questions.length}`;
  document.getElementById('result').textContent     = '';
  escapeCount = 0;
  hint.classList.remove('show');
  resetNoBtn();
}

function onYes() {
  const q = questions[current];
  document.getElementById('result').textContent = q.yesMsg;
  spawnHearts();
  document.getElementById('yes-btn').disabled = true;
  noBtn.style.pointerEvents = 'none';

  if (current < questions.length - 1) {
    current++;
    setTimeout(() => {
      document.getElementById('yes-btn').disabled = false;
      noBtn.style.pointerEvents = '';
      loadQuestion(current);
    }, 1400);
  } else {
    noBtn.style.display = 'none';
  }
}

function spawnHearts() {
  const c = document.getElementById('hearts');
  c.style.display = 'block';
  const e = ['💕','💖','💗','💓','🌸','✨'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = e[Math.floor(Math.random()*e.length)];
      h.style.left = Math.random()*90+5+'vw';
      h.style.top  = Math.random()*70+15+'vh';
      h.style.animationDelay = Math.random()*0.3+'s';
      c.appendChild(h);
      setTimeout(() => h.remove(), 2500);
    }, i*60);
  }
}

loadQuestion(0);
</script>
</body>
</html>
